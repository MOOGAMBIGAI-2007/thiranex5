<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NovaCart is a stylish product catalog experience built with HTML, CSS, and JavaScript." />
    <title>NovaCart | Premium Catalog</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="#/" data-route="#/">Nova<span>Cart</span></a>
        <nav class="nav-links">
          <button class="active" data-route="#/">Home</button>
          <button data-route="#/products">Products</button>
          <button data-route="#/about">About</button>
          <button data-route="#/contact">Contact</button>
        </nav>
        <div id="cart-badge" class="cart-pill">0 items in cart</div>
      </header>
      <main id="app"></main>
      <footer class="footer">Built for a modern capstone project with responsive HTML, CSS, and JavaScript.</footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
